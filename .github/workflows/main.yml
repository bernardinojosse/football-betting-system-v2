name: Ejecución Programada del Bot

on:
  schedule:
    # Se ejecuta cada 5 horas (minuto 0, cada 5 horas)
    - cron: '0 */5 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Bot de Apuestas
      env:
        AF_API_KEY: ${{ secrets.AF_API_KEY }}
        ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      run: python main.py

    - name: Guardar resultados en el repo
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add data/history.json
        git commit -m "Update betting history [skip ci]" || echo "No changes to commit"
        git push
