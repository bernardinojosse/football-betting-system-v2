name: Scheduled Betting Bot

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # ESTO ES LO QUE ARREGLA EL ERROR DE ESCRITURA
    permissions:
      contents: write

    steps:
    - name: Checkout del código
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 # Descarga todo el historial para evitar conflictos de push

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: pip install requests pandas python-dotenv

    - name: Run Bot
      env:
        ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        AF_API_KEY: ${{ secrets.AF_API_KEY }}
      run: python main.py

    - name: Commit and Push (Solución de Conflictos)
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
        # Estas 3 líneas evitan el error de 'failed to push'
        git pull origin main --rebase 
        git add data/history.json
        git commit -m "Auto-update history [skip ci]" || echo "No hay cambios"
        git push origin main
