name: Ejecución Programada del Bot

on:
  schedule:
    - cron: '0 */5 * * *' # Cada 5 horas
  workflow_dispatch: # Permite ejecutarlo tú mismo para probar

jobs:
  build:
    runs-on: ubuntu-latest
    
    # ESTA PARTE ES CRÍTICA: Da permiso al bot para escribir en tu repo
    permissions:
      contents: write

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Bot de Apuestas
      env:
        AF_API_KEY: ${{ secrets.AF_API_KEY }}
        ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      run: python main.py

    - name: Sincronizar y Guardar Resultados
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        # Aseguramos que el bot traiga cambios antes de subir los suyos
        git pull origin main
        git add data/history.json
        # Solo hace commit si hubo cambios en los datos
        git commit -m "Auto-update: Nuevas predicciones [skip ci]" || echo "No hay cambios para subir"
        git push
