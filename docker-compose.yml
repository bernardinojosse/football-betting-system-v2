version: '3.8'

services:
  betting-app:
    build: .
    volumes:
      - ./data:/app/data
    environment:
      - AF_API_KEY=${AF_API_KEY}

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
